<div id="memory-view" class="tab-content" style="display: none;">
    <div class="memory-header">
        <h1>Memory</h1>
        <div class="view-switcher">
            <button class="switcher-btn active" data-view="map">Neural Map</button>
            <button class="switcher-btn" data-view="bank">Knowledge Bank</button>
        </div>
        <div class="memory-actions">
            <button id="refresh-memory" class="btn btn-secondary">
                <span class="icon">🔄</span> Refresh
            </button>
            <div class="memory-stats">
                <span id="node-count">0 nodes</span>
                <span class="separator">|</span>
                <span id="edge-count">0 edges</span>
            </div>
        </div>
    </div>
    
    <div id="map-view" class="memory-container">
        <div class="map-layout">
            <div class="map-canvas-wrap">
                <canvas id="memory-canvas"></canvas>
                <div id="memory-tooltip" class="tooltip" style="display: none;"></div>
            </div>
            <aside id="node-detail-panel" class="node-detail-panel">
                <h3>Knowledge Node</h3>
                <div id="node-detail-empty" class="node-detail-empty">
                    Select a node on the map to inspect it.
                </div>
                <div id="node-detail-content" class="hidden">
                    <div class="node-detail-block">
                        <div class="node-detail-label">Name</div>
                        <div id="detail-node-name" class="node-detail-value"></div>
                    </div>
                    <div class="node-detail-block">
                        <div class="node-detail-label">Connections</div>
                        <div id="detail-node-degree" class="node-detail-value"></div>
                    </div>
                    <div class="node-detail-actions">
                        <button id="btn-node-expand" class="switcher-btn">Expand Neighbors</button>
                        <button id="btn-node-collapse" class="switcher-btn">Collapse</button>
                    </div>
                    <div class="node-detail-block">
                        <div class="node-detail-label">Relations</div>
                        <ul id="detail-node-relations" class="node-relations"></ul>
                    </div>
                </div>
            </aside>
        </div>
        
        <div class="memory-legend">
            <div class="legend-item"><span class="dot entity"></span> Entity</div>
            <div class="legend-item"><span class="dot journal"></span> Journal Link</div>
        </div>
        
        <div class="memory-controls">
            <button id="zoom-in" title="Zoom In">+</button>
            <button id="zoom-out" title="Zoom Out">−</button>
            <button id="reset-view" title="Reset View">⌂</button>
        </div>
    </div>

    <div id="bank-view" class="memory-container hidden">
        <div class="bank-sidebar">
            <h3>Categories</h3>
            <div class="category-list">
                <button class="cat-btn active" data-cat="">All Facts</button>
                <button class="cat-btn" data-cat="preference">Preferences</button>
                <button class="cat-btn" data-cat="habit">Habits</button>
                <button class="cat-btn" data-cat="constraint">Constraints</button>
                <button class="cat-btn" data-cat="person">People</button>
                <button class="cat-btn" data-cat="goal">Goals</button>
            </div>
        </div>
        <div class="bank-content">
            <div id="fact-list" class="fact-grid">
                <!-- Facts will be rendered here -->
            </div>
        </div>
    </div>
</div>
